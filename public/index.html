<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kack.li – die inoffizielle Kack & Sach API</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="/" class="logo-block">
        <span class="logo-kack">Kack.li</span>
        <span class="logo-amp">&</span>
        <span class="logo-sach">API</span>
        <span class="logo-tag">INOFFIZIELLE FREE FEED INFORMATIONen</span>
      </a>
      <div class="header-controls">
        <nav class="header-nav">
          <a href="/docs.html">API</a>
          <a href="/impressum.html">Impressum</a>
        </nav>
        <div class="status-block" id="status">
          <span class="status-dot"></span>
          <span class="status-text">Lade…</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Episode suchen…"
          autocomplete="off"
          spellcheck="false"
        >
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
      </div>
      <button class="btn-filter" id="filterToggle" onclick="toggleFilterPanel()">⊞ Filter</button>
      <button class="btn-filter-active" id="filterChip" onclick="clearFilters()" style="display:none"></button>
      <div class="count-label" id="countLabel">— Episoden</div>
    </div>

    <div class="filter-panel" id="filterBar" style="display:none">
      <div class="filter-section">
        <div class="filter-label">Gäste</div>
        <div class="filter-tags" id="guestTags"></div>
      </div>
      <div class="filter-section">
        <div class="filter-label">Themen</div>
        <div class="filter-tags" id="topicTags"></div>
      </div>
    </div>

    <div class="episode-grid" id="episodeGrid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Lade Episoden…</p>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>

  <!-- Episode Detail Modal -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
